version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: ai_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ai_redis_2024
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ai_redis_2024", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: ai_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ai_mongo
      MONGO_INITDB_ROOT_PASSWORD: ai_mongo_2024
      MONGO_INITDB_DATABASE: ai_framework
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ai_rabbit
      RABBITMQ_DEFAULT_PASS: ai_rabbit_2024
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: ai_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mongo
      - redis
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
  rabbitmq_data:
